version: '3.8'

services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - sneakers-api

  sneakers-api:
    image: golang:1.22
    ports:
      - "8080:8080"
    depends_on:
      - database
      - redis-cache

  database:
    image: postgres:15
    ports:
      - "5432:5432"

  redis-cache:
    image: redis:7
    ports:
      - "6379"
